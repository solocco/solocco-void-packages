name: Build Packages
on:
  push:
    branches:
      - main
    paths:
      - 'srcpkgs/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (leave empty to build all changed packages)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-zen-browser-bin:
    name: Build zen-browser-bin x86_64
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'zen-browser-bin' || github.event.inputs.package == '') ||
      github.event_name == 'push' && contains(join(github.event.commits.*.modified, ','), 'srcpkgs/zen-browser-bin')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: x86_64
        BOOTSTRAP: x86_64
        TEST: 0
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout void-packages
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          path: void-packages

      - name: Merge templates
        id: info
        run: |
          cp -rv main-repo/srcpkgs/zen-browser-bin void-packages/srcpkgs/
          chown -R builder:builder void-packages
          PKGVERSION=$(grep '^version=' main-repo/srcpkgs/zen-browser-bin/template | cut -d= -f2 | tr -d '"')
          echo "pkgversion=$PKGVERSION" >> $GITHUB_OUTPUT

      - name: Prepare masterdir
        run: |
          cd void-packages
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build zen-browser-bin
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          sudo -Eu builder ./xbps-src -j$(nproc) pkg zen-browser-bin

      - name: Sign and Index
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages/hostdir/binpkgs/
          echo "$PRIV_KEY" > private.pem
          xbps-rindex -a *.xbps
          xbps-rindex -s --signedby "solocco" --privkey private.pem $PWD
          xbps-rindex -S --privkey private.pem *.xbps
          rm private.pem

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zen-browser-bin-v${{ steps.info.outputs.pkgversion }}-${{ github.run_number }}
          name: zen-browser-bin v${{ steps.info.outputs.pkgversion }}
          body: |
            Automated build of Zen Browser for Void Linux.
            Version: ${{ steps.info.outputs.pkgversion }}
            Architecture: x86_64 (glibc)
          make_latest: true
          files: |
            void-packages/hostdir/binpkgs/*

  build-google-chrome-bin:
    name: Build google-chrome-bin x86_64
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'google-chrome-bin' || github.event.inputs.package == '') ||
      github.event_name == 'push' && contains(join(github.event.commits.*.modified, ','), 'srcpkgs/google-chrome-bin')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: x86_64
        BOOTSTRAP: x86_64
        TEST: 0
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout void-packages
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          path: void-packages

      - name: Merge templates
        id: info
        run: |
          cp -rv main-repo/srcpkgs/google-chrome-bin void-packages/srcpkgs/
          chown -R builder:builder void-packages
          PKGVERSION=$(grep '^version=' main-repo/srcpkgs/google-chrome-bin/template | cut -d= -f2 | tr -d '"')
          echo "pkgversion=$PKGVERSION" >> $GITHUB_OUTPUT

      - name: Prepare masterdir
        run: |
          cd void-packages
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build google-chrome-bin
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          mkdir -p common/conf
          echo "XBPS_ALLOW_RESTRICTED=yes" | sudo tee -a common/conf/make.conf
          sudo -Eu builder ./xbps-src -j$(nproc) pkg google-chrome-bin

      - name: Sign and Index
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages/hostdir/binpkgs/nonfree/
          echo "$PRIV_KEY" > private.pem
          xbps-rindex -a *.xbps
          xbps-rindex -s --signedby "solocco" --privkey private.pem $PWD
          xbps-rindex -S --privkey private.pem *.xbps
          rm private.pem

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: google-chrome-bin-v${{ steps.info.outputs.pkgversion }}-${{ github.run_number }}
          name: google-chrome-bin v${{ steps.info.outputs.pkgversion }}
          body: |
            Automated build of Google Chrome for Void Linux.
            Version: ${{ steps.info.outputs.pkgversion }}
            Architecture: x86_64 (glibc)
          make_latest: false
          files: |
            void-packages/hostdir/binpkgs/nonfree/*
