name: Build Packages
on:
  push:
    branches:
      - main
    paths:
      - 'srcpkgs/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (zen-browser-bin / google-chrome-bin / all)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  build-zen-browser-bin:
    name: Build zen-browser-bin
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'zen-browser-bin' || github.event.inputs.package == 'all')) ||
      (github.event_name == 'push' && contains(join(github.event.commits.*.modified, ','), 'srcpkgs/zen-browser-bin'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: x86_64
        BOOTSTRAP: x86_64
        TEST: 0
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout void-packages
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          path: void-packages

      - name: Merge templates
        id: info
        run: |
          cp -rv main-repo/srcpkgs/zen-browser-bin void-packages/srcpkgs/
          chown -R builder:builder void-packages
          ZEN_VER=$(grep '^version=' main-repo/srcpkgs/zen-browser-bin/template | cut -d= -f2 | tr -d '"')
          echo "zen_version=$ZEN_VER" >> $GITHUB_OUTPUT

      - name: Prepare masterdir
        run: |
          cd void-packages
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build zen-browser-bin
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          sudo -Eu builder ./xbps-src -j$(nproc) pkg zen-browser-bin

      - name: Download existing repo from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/repo
          # Download semua file dari release "repo-latest" kalau sudah ada
          gh release download repo-latest \
            --repo ${{ github.repository }} \
            --dir /tmp/repo \
            --pattern "*.xbps" \
            --pattern "*.xbps.sig2" \
            --pattern "x86_64-repodata" || echo "No existing release found, starting fresh"

      - name: Merge new packages into repo
        run: |
          # Copy hasil build baru, timpa file lama kalau ada
          find void-packages/hostdir/binpkgs -name "*.xbps" -exec cp -f {} /tmp/repo/ \;
          find void-packages/hostdir/binpkgs -name "*.xbps.sig2" -exec cp -f {} /tmp/repo/ \;

      - name: Sign and Index
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd /tmp/repo
          # Hapus repodata lama supaya dibuat ulang
          rm -f x86_64-repodata
          echo "$PRIV_KEY" > private.pem
          xbps-rindex -a *.xbps
          xbps-rindex -s --signedby "solocco" --privkey private.pem $PWD
          xbps-rindex -S --privkey private.pem *.xbps
          rm private.pem

      - name: Upload to permanent release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Buat release kalau belum ada
          gh release create repo-latest \
            --repo ${{ github.repository }} \
            --title "solocco-void-packages" \
            --notes "Permanent repository release. Files are updated automatically on each build." \
            --latest || true
          # Upload semua file (timpa yang lama)
          gh release upload repo-latest \
            --repo ${{ github.repository }} \
            --clobber \
            /tmp/repo/*

  build-google-chrome-bin:
    name: Build google-chrome-bin
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'google-chrome-bin' || github.event.inputs.package == 'all')) ||
      (github.event_name == 'push' && contains(join(github.event.commits.*.modified, ','), 'srcpkgs/google-chrome-bin'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: x86_64
        BOOTSTRAP: x86_64
        TEST: 0
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout void-packages
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          path: void-packages

      - name: Merge templates
        id: info
        run: |
          cp -rv main-repo/srcpkgs/google-chrome-bin void-packages/srcpkgs/
          chown -R builder:builder void-packages
          CHR_VER=$(grep '^version=' main-repo/srcpkgs/google-chrome-bin/template | cut -d= -f2 | tr -d '"')
          echo "chrome_version=$CHR_VER" >> $GITHUB_OUTPUT

      - name: Prepare masterdir
        run: |
          cd void-packages
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build google-chrome-bin
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          mkdir -p common/conf
          echo "XBPS_ALLOW_RESTRICTED=yes" | sudo tee -a common/conf/make.conf
          sudo -Eu builder ./xbps-src -j$(nproc) pkg google-chrome-bin

      - name: Download existing repo from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/repo
          gh release download repo-latest \
            --repo ${{ github.repository }} \
            --dir /tmp/repo \
            --pattern "*.xbps" \
            --pattern "*.xbps.sig2" \
            --pattern "x86_64-repodata" || echo "No existing release found, starting fresh"

      - name: Merge new packages into repo
        run: |
          find void-packages/hostdir/binpkgs -name "*.xbps" -exec cp -f {} /tmp/repo/ \;
          find void-packages/hostdir/binpkgs -name "*.xbps.sig2" -exec cp -f {} /tmp/repo/ \;

      - name: Sign and Index
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd /tmp/repo
          rm -f x86_64-repodata
          echo "$PRIV_KEY" > private.pem
          xbps-rindex -a *.xbps
          xbps-rindex -s --signedby "solocco" --privkey private.pem $PWD
          xbps-rindex -S --privkey private.pem *.xbps
          rm private.pem

      - name: Upload to permanent release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create repo-latest \
            --repo ${{ github.repository }} \
            --title "solocco-void-packages" \
            --notes "Permanent repository release. Files are updated automatically on each build." \
            --latest || true
          gh release upload repo-latest \
            --repo ${{ github.repository }} \
            --clobber \
            /tmp/repo/*
