name: Update Check
on:
  workflow_dispatch:
  schedule:
    # Setiap hari jam 08:00 UTC (15:00 WIB)
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  # ==================== ZEN BROWSER ====================
  update-zen-browser-bin:
    name: Check zen-browser-bin updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-zen-browser-bin.sh
          ./scripts/update-zen-browser-bin.sh

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update zen-browser-bin to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/zen-browser-bin/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== GOOGLE CHROME ====================
  update-google-chrome-bin:
